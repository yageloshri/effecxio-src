<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form Section</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAFA;--surface:#FFF;--border:#E5E5E5;--fg:#18181B;--fg-muted:#71717A;--emerald:#059669;--emerald-light:#ECFDF5;--sans:'Inter',sans-serif}
body{background:var(--bg);color:var(--fg);font-family:var(--sans)}
.section{max-width:900px;margin:0 auto;padding:80px 40px}
.s-center{text-align:center;margin-bottom:50px}
.s-tag{font-size:.75rem;color:var(--emerald);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.s-title{font-size:clamp(2rem,4vw,2.8rem);font-weight:700;letter-spacing:-.02em}
.s-desc{font-size:1rem;color:var(--fg-muted);margin-top:8px}
.contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:40px;align-items:start}
/* Info side */
.contact-info{padding:20px 0}
.ci-item{display:flex;gap:14px;margin-bottom:24px}
.ci-item .ci-icon{width:40px;height:40px;background:var(--emerald-light);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-item .ci-icon svg{width:18px;height:18px}
.ci-item h3{font-size:.9rem;font-weight:700;margin-bottom:2px}
.ci-item p{font-size:.85rem;color:var(--fg-muted)}
.ci-social{display:flex;gap:10px;margin-top:30px}
.ci-social a{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;text-decoration:none}
.ci-social a:hover{border-color:var(--emerald);background:var(--emerald-light)}
.ci-social a svg{width:16px;height:16px}
/* Form */
.contact-form{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;margin-bottom:12px}
.form-group label{font-size:.78rem;font-weight:600;margin-bottom:6px;color:var(--fg)}
.form-group input,.form-group textarea,.form-group select{padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:.88rem;color:var(--fg);background:var(--bg);transition:border-color .2s;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--emerald)}
.form-group textarea{min-height:100px}
.form-btn{width:100%;padding:13px;background:var(--emerald);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-weight:700;font-size:.9rem;cursor:pointer;transition:transform .2s}
.form-btn:hover{transform:translateY(-1px)}
@media(max-width:768px){.contact-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="section">
<div class="s-center"><div class="s-tag">Contact</div><div class="s-title">Get in Touch</div><div class="s-desc">Have a question or want to work together? We'd love to hear from you.</div></div>
<div class="contact-grid">
<div class="contact-info">
<div class="ci-item"><div class="ci-icon"><svg viewBox="0 0 18 18" fill="none"><path d="M3 6l6 4 6-4" stroke="#059669" stroke-width="1.3"/><rect x="2" y="4" width="14" height="10" rx="2" stroke="#059669" stroke-width="1.3"/></svg></div><div><h3>Email</h3><p>hello@company.com</p></div></div>
<div class="ci-item"><div class="ci-icon"><svg viewBox="0 0 18 18" fill="none"><path d="M3 4h12l-1 10H4L3 4z" stroke="#059669" stroke-width="1.3"/><path d="M7 4V3a2 2 0 014 0v1" stroke="#059669" stroke-width="1.3"/></svg></div><div><h3>Office</h3><p>123 Innovation St, Tel Aviv</p></div></div>
<div class="ci-item"><div class="ci-icon"><svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#059669" stroke-width="1.3"/><path d="M9 5v4l3 2" stroke="#059669" stroke-width="1.3" stroke-linecap="round"/></svg></div><div><h3>Hours</h3><p>Sun-Thu, 9:00 - 18:00</p></div></div>
<div class="ci-social">
<a href="#"><svg viewBox="0 0 16 16" fill="none"><path d="M8 1C4.1 1 1 4.1 1 8c0 3.1 2 5.7 4.8 6.6.35.06.48-.15.48-.34L6.3 13c-2 .43-2.4-.96-2.4-.96-.32-.82-.78-1.04-.78-1.04-.64-.44.05-.43.05-.43.7.05 1.07.72 1.07.72.63 1.08 1.65.77 2.05.59.06-.46.24-.77.44-.95-1.56-.18-3.2-.78-3.2-3.47 0-.77.27-1.4.72-1.89-.07-.18-.31-.9.07-1.87 0 0 .59-.19 1.93.72A6.7 6.7 0 018 4.07c.6 0 1.2.08 1.76.24 1.34-.91 1.93-.72 1.93-.72.38.97.14 1.69.07 1.87.45.49.72 1.12.72 1.89 0 2.7-1.64 3.29-3.2 3.47.25.22.48.64.48 1.3l-.01 1.92c0 .19.13.41.49.34A7 7 0 0015 8c0-3.9-3.1-7-7-7z" fill="#059669"/></svg></a>
<a href="#"><svg viewBox="0 0 16 16" fill="none"><path d="M12.6 1H3.4A2.4 2.4 0 001 3.4v9.2A2.4 2.4 0 003.4 15h9.2a2.4 2.4 0 002.4-2.4V3.4A2.4 2.4 0 0012.6 1zM5.5 13H3.2V6.2h2.3V13zM4.35 5.2a1.35 1.35 0 110-2.7 1.35 1.35 0 010 2.7zM13 13h-2.3V9.7c0-.8-.02-1.8-1.1-1.8-1.1 0-1.27.86-1.27 1.74V13H6.1V6.2h2.2v.93h.03c.3-.58 1.05-1.2 2.17-1.2 2.32 0 2.75 1.53 2.75 3.52V13z" fill="#059669"/></svg></a>
<a href="#"><svg viewBox="0 0 16 16" fill="none"><path d="M14.4 4.6c-.5.2-1.1.4-1.6.4.6-.3 1-.9 1.2-1.5-.5.3-1.1.5-1.8.7a2.8 2.8 0 00-4.8 2.6A8 8 0 012.2 3.3a2.8 2.8 0 00.9 3.8c-.4 0-.9-.1-1.2-.3v.03a2.8 2.8 0 002.3 2.8c-.4.1-.9.1-1.3 0a2.8 2.8 0 002.6 2c-1 .8-2.2 1.2-3.5 1.2H1A8 8 0 005.3 14c5.2 0 8-4.3 8-8v-.4c.6-.4 1-.9 1.4-1.5z" fill="#059669"/></svg></a>
</div>
</div>
<form class="contact-form">
<div class="form-row">
<div class="form-group"><label>First Name</label><input type="text" placeholder="John"></div>
<div class="form-group"><label>Last Name</label><input type="text" placeholder="Doe"></div>
</div>
<div class="form-group"><label>Email</label><input type="email" placeholder="john@example.com"></div>
<div class="form-group"><label>Subject</label><select><option>General Inquiry</option><option>Partnership</option><option>Support</option><option>Billing</option></select></div>
<div class="form-group"><label>Message</label><textarea placeholder="Tell us how we can help..."></textarea></div>
<button type="button" class="form-btn">Send Message</button>
</form>
</div>
</section>
<script>const isPreview=(self!==top);</script>
</body>
</html>
