<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>3D Pokemon Card Holo Effect</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Heebo:100,300,400,500,700,800,900'>

  <style>
#app {
  height: 100%;
  perspective-origin: 50% 50%;
  perspective: 800px;
  padding-top: 50px;
}


.card {
  width: 340px;
  height: 480px;
  background-color: #211799;
  background-image: url(https://images.pokemontcg.io/smp/SM156.png);
  background-size: 100%;
  background-repeat: no-repeat;
  background-position: center;
  border-radius: 8px;
  box-shadow: 0 0 6px 2px rgba(255, 230, 0, 0.75), 0 35px 25px -15px rgba(0, 0, 0, 0.5);
  position: relative;
  overflow: hidden;
  display: inline-block;
  margin: 20px 10px;
  will-change: transform;
  transition: transform 100ms ease;
  transition-property: transform;
  transform-style: preserve-3d;
  transform-origin: 50% 50%;
  transform: translate3d(0%, 0%, -400px);
}
.card:hover {
  z-index: 2;
}

.card.charizard {
  background-image: url(https://images.pokemontcg.io/xy12/12_hires.png);
}

.card.mewtwo {
  background-image: url(https://images.pokemontcg.io/xy12/52_hires.png);
}
.card.mewtwo:before, .card.mewtwo:after {
  -webkit-animation-delay: 0.33s;
          animation-delay: 0.33s;
}

.card.dragonite {
  background-image: url(https://images.pokemontcg.io/xy12/72_hires.png);
}
.card.dragonite:before, .card.dragonite:after {
  -webkit-animation-delay: 0.66s;
          animation-delay: 0.66s;
}

.card:before,
.card:after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  top: 0;
  background-image: linear-gradient(115deg, transparent 0%, #00e7ff 30%, #ff00e7 70%, transparent 100%);
  background-position: 0% 0%;
  background-repeat: no-repeat;
  background-size: 300% 300%;
  mix-blend-mode: color-dodge;
  opacity: 0;
  z-index: 1;
  transform: translate3d(0, 0, 0);
  -webkit-animation: holoGradient 15s ease infinite;
          animation: holoGradient 15s ease infinite;
}

.card:after {
  background-image: url("https://s3-us-west-2.amazonaws.com/s.cdpn.io/13471/sparkles.gif");
  background-position: center;
  background-size: 180%;
  mix-blend-mode: color-dodge;
  opacity: 0;
  z-index: 2;
  -webkit-animation: holoSparkle 20s ease infinite;
          animation: holoSparkle 20s ease infinite;
}

.card.active:before {
  opacity: 0.5;
  -webkit-animation: none;
          animation: none;
  transition: none;
  background-image: linear-gradient(115deg, transparent 0%, transparent 25%, #00e7ff 45%, #ff00e7 55%, transparent 70%, transparent 100%);
}

@-webkit-keyframes holoSparkle {
  0% {
    opacity: 0;
  }
  12% {
    opacity: 1;
  }
  70% {
    opacity: 0.5;
  }
  95% {
    opacity: 0.2;
  }
}

@keyframes holoSparkle {
  0% {
    opacity: 0;
  }
  12% {
    opacity: 1;
  }
  70% {
    opacity: 0.5;
  }
  95% {
    opacity: 0.2;
  }
}
@-webkit-keyframes holoGradient {
  3% {
    opacity: 0;
  }
  5% {
    background-position: 0% 0%;
  }
  7% {
    opacity: 0.5;
  }
  9% {
    background-position: 100% 100%;
  }
  11% {
    opacity: 0;
  }
  50% {
    opacity: 0;
    background-position: 100% 100%;
  }
  55% {
    opacity: 0.3;
  }
  70% {
    opacity: 0;
    background-position: 0% 0%;
  }
}
@keyframes holoGradient {
  3% {
    opacity: 0;
  }
  5% {
    background-position: 0% 0%;
  }
  7% {
    opacity: 0.5;
  }
  9% {
    background-position: 100% 100%;
  }
  11% {
    opacity: 0;
  }
  50% {
    opacity: 0;
    background-position: 100% 100%;
  }
  55% {
    opacity: 0.3;
  }
  70% {
    opacity: 0;
    background-position: 0% 0%;
  }
}
body {
  color: white;
  background: #333844;
  font-family: "Heebo", sans-serif;
  display: flex;
  justify-content: center;
  text-align: center;
}

html {
  height: 100%;
}

h1 {
  display: block;
  margin-top: 30px;
}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
    
  <body style="background: #151f28">

<main id=app>
  
  
  <div class="card charizard"></div>
  <div class="card mewtwo"></div>
  
  <style class="hover"></style>
  
</main>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js'></script><script>


const $cards = $(".card");
const $style = $(".hover");

$cards.on("mousemove", function(e) {
  var $card = $(this);
  var l = e.offsetX;
  var t = e.offsetY;
  var h = $card.height();
  var w = $card.width();
  var lp = Math.abs(Math.floor(100 / w * l)-100);
  var tp = Math.abs(Math.floor(100 / h * t)-100);
  var bg = `background-position: ${lp}% ${tp}%;`
  var style = `.card.active:before { ${bg} }`
  $cards.removeClass("active");
  $card.addClass("active");
  $style.html(style);
}).on("mouseout", function() {
  $cards.removeClass("active");
});

//
// 3d hover magic
//
const resetTransform = (el, perspective = 800) =>
  (el.style.transform = `translate3d(0%, 0%, -${perspective /
    2}px) rotateX(0deg) rotateY(0deg)`);

const onMove = (ev, el) => {
  const { pageX, pageY } = ev;
  const { offsetWidth, offsetHeight } = el;
  const { left, top } = el.getBoundingClientRect();

  const cardX = left + offsetWidth / 2;
  const cardY = top + offsetHeight / 2;

  const angle = 25;
  const rotX = (cardY - pageY) / angle;
  const rotY = (cardX - pageX) / -angle;

  el.style.transform = `translate3d(0%, 0%, 0) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
};

const perspective =
    getComputedStyle($cards[0].parentElement)
      .getPropertyValue("perspective")
      .replace("px", "") || 800;

const onCardMove = ev => onMove(ev, ev.target);
const onHover = ev => ev.target.addEventListener("mousemove", onCardMove);
const onOut = ev => {
  resetTransform(ev.target, perspective); // reset card
  ev.target.removeEventListener("mousemove", onCardMove);
};

// setup cards interaction
[...$cards.toArray()].forEach(card => {
  card.addEventListener("mouseover", onHover);
  card.addEventListener("mouseout", onOut);
});
</script>

  </body>
  
</html>
