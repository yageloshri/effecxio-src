<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    
<style>

*{
    padding: 0px;
    margin: 0px;
    box-sizing: border-box;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap : 50px;
    background: #151f28;
}

.pixel-btn{
    position: relative;
    width: 180px;
    height: 60px;
    border: none;
    background: #333;
    color: white;
    font-size: 1.15em;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    outline: none;
}

.pixel-btn span{
    position: relative;
    z-index: 2;
}

.pixel-container{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
}

.pixel-container .pixel{
    position: absolute;
    width: 10px;
    height: 10px;
    pointer-events: none;
    background: var(--clr);
    transition: transform 0.5s ease , opacity 0.5s ease;
}

.pixel-btn:hover .pixel{
    opacity: 0;
    transform: translate(var(--tx),var(--ty));
}






</style>
</head>
<body>
    <button class="pixel-btn">
        <span>Hover Me</span>
        <div class="pixel-container" style="--clr:#00ffe5;"></div>
    </button>

    <button class="pixel-btn">
        <span>Hover Me</span>
        <div class="pixel-container" style="--clr:#22ff00;"></div>
    </button>

    <script>
        let buttons = document.querySelectorAll('.pixel-btn');
        buttons.forEach(button=>{
            let pixelcontainer = button.querySelector('.pixel-container');
            let pixSize = 10;
            let btnwidth = button.offsetWidth;
            let btnheight = button.offsetHeight;

            let cols = Math.floor(btnwidth/pixSize);
            let rows = Math.floor(btnheight/pixSize);

            for(let row=0;row<rows;row++)
            {
                for(let col=0;col<cols;col++)
                {
                    let pixel = document.createElement('div');
                    pixel.classList.add('pixel');
                    pixel.style.left = `${col * pixSize}px`;
                    pixel.style.top = `${row * pixSize}px`;

                    let dealy = Math.random() * 0.5;
                    pixel.style.transitionDelay = `${dealy}s`;

                    let tx = (Math.random() - 0.5) * 30;
                    let ty = (Math.random() - 0.5) * 30;

                    pixel.style.setProperty('--tx', `${tx}px`);
                    pixel.style.setProperty('--ty', `${ty}px`);

                    pixelcontainer.appendChild(pixel);
                }  
            }
        })

    </script>
</body>
</html>
