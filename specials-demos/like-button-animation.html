@import url("https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap");
* {
  box-sizing: border-box;
  -webkit-user-select: none;
     -moz-user-select: none;
      -ms-user-select: none;
          user-select: none;
}
:root {
  --pink: #fea4d7;
  --pink-bg: #fef5fb;
  --pink-light: #fee6f4;
  --pink-dark: #eb60af;
  --button-bg: #fff;
  --stroke: #eff0f0;
  --text: #2e3333;
  --number: #a9adad;
  --color: #c3c6c6;
  --heart-stroke: #c3c6c6;
  --stroke-active: #26292b;
  --transition: 0.2s;
}
body {
  display: grid;
  place-items: center;
  min-height: 100vh;
  font-family: "Roboto", sans-serif;
  background: url("https://assets.codepen.io/605876/heart-outline-bg.svg");
  background-position: calc(var(--x, 50) * 1%) calc(var(--y, 50) * 1%);
}
body:after {
  content: '';
  position: absolute;
  opacity: var(--backdrop-opacity, 0);
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  z-index: -1;
  background: url("https://assets.codepen.io/605876/heart-bg.svg"), var(--pink-bg);
  background-position: calc(var(--x, 50) * 1%) calc(var(--y, 50) * 1%);
}
button {
  --hovered: 0;
  cursor: pointer;
  padding: 0;
  margin: 0;
  border: 0;
  -webkit-appearance: none;
     -moz-appearance: none;
          appearance: none;
  background: transparent;
  position: relative;
  display: none;
}
button:hover {
  --hovered: 1;
}
.stroked {
  stroke: var(--stroke-active);
}
.bear-one--light {
  fill: #a2642a;
}
.bear-one--dark {
  fill: #5d3918;
}
.bear-two--light {
  fill: #fff9d7;
}
.bear-two--dark {
  fill: #fed65d;
}
.bear-pad--light {
  fill: #d99c73;
}
.bear-pad--dark {
  fill: #efd4c3;
}
.heart {
  overflow: visible !important;
  height: 100%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: calc(1 - var(--hovered, 0));
}
.heart__outline {
  stroke: var(--stroke-active);
  stroke-width: 1.25px;
}
.heart__baseline {
  stroke: var(--color);
  stroke-width: 1.25px;
}
.heart__body {
  fill: var(--pink);
}
.heart__shine {
  fill: var(--pink-light);
}
.heart__shadow {
  fill: var(--pink-dark);
}
.transformer {
  --font-size: 32px;
  --border-width: 4px;
  --border-radius: 10px;
  --padding-v: 26px;
  --padding-h: 36px;
  --padding-t: 10px;
  --padding-b: 4px;
  font-size: var(--font-size);
  position: relative;
  outline: transparent;
}
.transformer * {
  display: inline-block;
}
.transformer__container {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.transformer__paws {
  height: 100%;
  width: 80%;
  position: absolute;
  border: var(--border-width) solid #ffc0cb;
  border-left: 0;
  border-right: 0;
  z-index: 2;
}
.transformer__front {
  padding: var(--padding-v) calc(var(--padding-t) + var(--padding-b)) var(--padding-v) var(--padding-h);
  padding: 0 calc(var(--padding-t) + var(--padding-b)) 0 var(--padding-h);
  border: var(--border-width) solid var(--stroke);
  border-radius: var(--border-radius) 0 0 var(--border-radius);
  border-right: 0;
  z-index: 2;
}
.transformer__middle {
  padding: var(--padding-v) var(--padding-t);
  padding: 0 var(--padding-t);
  border: var(--border-width) solid var(--stroke);
  border-radius: 0;
  border-left: 0;
  border-right: 0;
}
.transformer__back {
  border: var(--border-width) solid var(--stroke);
  border-radius: 0 var(--border-radius) var(--border-radius) 0;
  padding: var(--padding-v) var(--padding-h) var(--padding-v) var(--padding-b);
  padding: 0 var(--padding-h) 0 var(--padding-b);
  border-left: 0;
  z-index: 2;
}
.transformer__number {
  font-size: var(--font-size);
  line-height: var(--font-size);
  height: var(--font-size);
  color: var(--color);
  transform: translate(6px, 0);
}
.transformer__text {
  color: var(--text);
  font-size: var(--font-size);
  line-height: var(--font-size);
  opacity: calc(1 - var(--hovered, 0));
  transition: transform var(--transition), opacity var(--transition);
  transform: translateY(calc(var(--hovered, 0) * 80%));
}
.transformer__outline {
  position: absolute;
  height: 100%;
  width: 90%;
  left: 50%;
  top: 0;
  border: var(--border-width) solid var(--stroke);
  border-left: 0;
  border-right: 0;
  z-index: 10;
  transform: translate3d(-50%, 0, 0);
}
.transformer__segment {
  background: var(--button-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 92px;
}
.transformer__feature {
  height: var(--font-size);
  position: relative;
  width: var(--font-size);
  transition: transform var(--transition);
  transform: translate(-6px, 0) translateX(calc(var(--hovered, 0) * 100%));
}
.number {
  position: absolute;
  left: 0;
}
.number__place {
  height: var(--font-size);
  display: inline-block;
  position: relative;
  width: 18px;
}
.slap {
  position: absolute;
  height: calc(var(--font-size) * 2);
  width: calc(var(--font-size) * 2);
  top: 50%;
  left: 38%;
  transform: translate(-50%, -50%);
  z-index: 4;
  display: none;
  overflow: visible !important;
}
.paw {
  height: calc(var(--font-size) * 2);
  position: absolute;
  top: 0%;
  left: 50%;
  transform: translate(-50%, 0%);
  width: var(--font-size);
}
.paw--right {
  z-index: 5;
  top: 125%;
  left: 55%;
}
.bear-paw {
  position: absolute;
  height: 150%;
  opacity: var(--hovered, 0);
  transition: var(--transition);
  overflow: visible !important;
  left: 50%;
  top: 0;
  transform: translate(-50%, -14%);
}
.wiggle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 100px;
  overflow: visible !important;
  display: none;
  z-index: 10;
}
.dashed {
  height: 100%;
  overflow: visible !important;
}
.dashed__container {
  display: none;
  top: 50%;
  left: 50%;
  height: 100px;
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 11;
}
.geo {
  height: 100%;
  overflow: visible !important;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.geo__wrap {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 12;
  height: 20px;
  width: 20px;
}
.burst {
  display: none;
  height: 30px;
  width: 30px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(calc(var(--rotate, 0) * 1deg)) translateY(calc(var(--translate, 0) * -1px));
  z-index: 12;
}
.burst__line {
  position: absolute;
  height: 30px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(calc((-45 + (var(--index) * 30)) * 1deg));
  transform-origin: 50% 100%;
  overflow: visible !important;
  z-index: 12;
}
</style>

    <script src='https://unpkg.co/gsap@3.2.6/dist/gsap.min.js'></script><script>
// import gsap from 'https://cdn.skypack.dev/gsap'
const gsap = window.gsap;
const { timeline } = gsap;
const TRANSFORMER = document.querySelector('.transformer');
const TTEXT = document.querySelector('.transformer__middle');
const duration = 0.2;



gsap.set('.number--next', {
  yPercent: -100,
  opacity: 0 });

gsap.set('.slap__line', {
  transformOrigin: '50% 50%',
  rotate: index => -45 + index * 45 });

gsap.set('.slap__line path', {
  transformOrigin: '50% 50%',
  yPercent: -350,
  scaleY: 0.75 });

gsap.set('.heart__segment', {
  opacity: 0 });


/**
 * The Timeline
 * 1. Move Paw to Left
 * 2. Meet to slap in the middle with right paw
 * 3. Paws disappear
 */

const LEFT_PAW_TL = () =>
timeline({}).
set('.transformer__feature', {
  transition: 'none' }).

to('.transformer__feature', {
  keyframes: [
  {
    xPercent: -130,
    ease: 'power1.out',
    duration: 0.125 },

  {
    xPercent: 20,
    ease: 'power1.in',
    duration: 0.125 },

  {
    xPercent: -20,
    delay: 0.1,
    ease: 'power1.out',
    duration: 0.15 }] });




const RIGHT_PAW_TL = () =>
timeline().to('.paw--right', {
  keyframes: [
  {
    ease: 'power1.in',
    xPercent: -175,
    yPercent: -125,
    duration: 0.25 },

  {
    ease: 'power1.out',
    delay: 0.15,
    duration: 0.35,
    xPercent: 0,
    yPercent: 0 }] });




const RESIZE_TL = () =>
timeline({}).
set('.bear-paw', {
  opacity: 1 }).

to(
document.documentElement,
{
  '--backdrop-opacity': 1,
  duration },

0).

to(
document.documentElement,
{
  '--stroke': 'hsl(326, 56%, 85%)',
  '--color': 'hsl(204, 6%, 16%)',
  duration },

0).

to(
'.transformer__segment',
{
  background: 'hsl(327, 91%, 96%)',
  duration },

0).

to(
'.transformer__heart',
{
  opacity: 1,
  duration },

0).

to(
'.paw--left',
{
  opacity: 0,
  duration },

0).

to(
'.transformer__feature',
{
  xPercent: -100,
  duration },

0).

to(
'.transformer__outline',
{
  scaleX: 0.6,
  duration },

0).

to(
'.transformer__front',
{
  x: TTEXT.offsetWidth / 2,
  duration },

0).

to(
'.transformer__back',
{
  x: -(TTEXT.offsetWidth / 2),
  duration },

0).

to(
'.number.number--current.number--single',
{
  yPercent: 100,
  opacity: 0,
  duration },

0).

to(
'.number.number--next.number--single',
{
  yPercent: 0,
  duration,
  opacity: 1 },

0).

to(
'.heart__segment',
{
  opacity: 1,
  duration },

0);


const SLAP_TL = () =>
gsap.
timeline({
  onStart: () => {
    AUDIO.CLAP.play();
    gsap.set('.slap', {
      display: 'block' });

  },
  onComplete: () => {
    gsap.set('.slap', {
      display: 'none' });

    gsap.set('.slap__circle', { clearProps: 'all' });
  } }).

set('.slap__circle', {
  stroke: `hsl(${Math.random() * 359}, 85%, 60%)` }).

to('.slap__circle', {
  strokeWidth: 0,
  scale: 2.5,
  duration: 0.15,
  transformOrigin: '50% 50%' }).

fromTo(
'.slap__line path',
{
  strokeDashoffset: -11 },

{
  yPercent: -400,
  duration: 0.15,
  strokeDashoffset: 11 },

0);


const CELEBRATE_TL = () =>
gsap.
timeline({
  repeatRefresh: true,
  onStart: () => {
    gsap.delayedCall(0.25, () => AUDIO.CHEER.play());
    gsap.set(['.wiggle', '.dashed__container', '.burst'], {
      display: 'block' });

  },
  onComplete: () => {
    gsap.set(['.wiggle', '.dashed__container', '.burst'], {
      display: 'none' });

  } }).

set('.celebration-line', {
  stroke: () => `hsl(${Math.random() * 359}, 100%, 70%)` }).

set('.dashed__line', {
  yPercent: -120 }).

set('.dashed', {
  yPercent: 0 }).

set('.burst', {
  '--rotate': () => Math.random() * 360,
  '--translate': () => Math.random() * 100 + 180 }).

set(['.wiggle', '.dashed__container'], {
  rotate: () => Math.random() * 360 }).

set(['.wiggle__line', '.dashed'], {
  yPercent: () => Math.random() * 150 + 180,
  scaleY: () => Math.random() + 0.5 }).

fromTo(
'.dashed__line',
{
  yPercent: -120 },

{
  yPercent: 120,
  duration: 0.5 },

0).

to('.dashed', {
  yPercent: 'random(20, 100)' }).

fromTo(
['.wiggle__line'],
{
  strokeDashoffset: -32 },

{
  delay: () => Math.random(),
  yPercent: '+=50',
  duration: 0.5,
  strokeDashoffset: 32 },

0).

fromTo(
'.burst__line path',
{
  strokeDashoffset: -32 },

{
  delay: () => Math.random() * 0.5,
  yPercent: `-=50`,
  strokeDashoffset: 32 },

0);


const TRANSFORMER_TL = () =>
timeline({
  onComplete: () => {
    TRANSFORMER.removeAttribute('disabled');
  } })

// Set the hover states concretely
.set('.transformer__feature', {
  // Setting xPercent is only going to work on desktop
  '--hovered': 1 }).

set('.bear-paw', {
  opacity: 1 }).

set('.transformer__text', {
  yPercent: 80,
  opacity: 0 })

// Make the left paw movement using the feature element
// This means the heart and the paw track movement
.add(LEFT_PAW_TL(), 0.25).
add(RIGHT_PAW_TL(), '<').
add(SLAP_TL(), '>-0.5').
add(CELEBRATE_TL(), '<').
add(RESIZE_TL(), '<+0.5').
to(
'.transformer__heart',
{
  scale: 1.25,
  repeat: 1,
  yoyo: true,
  ease: 'elastic.in' },

'>-0.2');


const RESET_TL = timeline({
  paused: true,
  onStart: () => {
    AUDIO.SIGH.play();
  },
  onComplete: () => {
    gsap.set(['.transformer__heart', '.paw--left', '.bear-paw'], {
      clearProps: 'all' });

  } }).

set(['.transformer__feature', '.transformer__text'], {
  clearProps: 'all' }).

to('.transformer__front', {
  x: 0,
  duration }).

to(
'.heart__segment',
{
  opacity: 0,
  duration },

0).

to(
'.transformer__outline',
{
  scaleX: 1,
  duration },

0).

to(
'.transformer__segment',
{
  background: 'hsl(0, 0%, 100%)',
  duration },

0).

to(
'.transformer__back',
{
  x: 0,
  duration },

0).

to(
document.documentElement,
{
  '--backdrop-opacity': 0,
  '--stroke': 'hsl(180, 3%, 94%)',
  '--color': 'hsl(180, 2%, 77%)',
  duration },

0).

to(
'.number.number--current.number--single',
{
  yPercent: 0,
  duration,
  opacity: 1 },

0).

to(
'.number.number--next.number--single',
{
  yPercent: -100,
  duration,
  opacity: 0 },

0).

to(
'.paw--left',
{
  opacity: 1,
  duration },

0).

to(
'.transformer__heart',
{
  opacity: 0,
  duration },

0);


TRANSFORMER.addEventListener('pointerdown', ({ x, y }) => {
  if (TRANSFORMER.hasAttribute('disabled')) return;
  if (TRANSFORMER.getAttribute('aria-pressed') === 'true') {
    TRANSFORMER.setAttribute('aria-pressed', false);
    RESET_TL.restart();
  } else {
    TRANSFORMER.setAttribute('aria-pressed', true);
    TRANSFORMER.setAttribute('disabled', true);
    const SVG = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    const CIRCLE = document.createElementNS(
    'http://www.w3.org/2000/svg',
    'circle');

    const BOUNDS = TRANSFORMER.getBoundingClientRect();
    gsap.set(SVG, {
      height: 50,
      width: 50,
      left: x - BOUNDS.left - 25,
      top: y - BOUNDS.top - 25,
      overflow: 'visible !important',
      zIndex: 12,
      transformOrigin: '50% 50%',
      position: 'absolute',
      attr: {
        viewBox: '0 0 100 100',
        fill: 'none' } });


    SVG.appendChild(CIRCLE);
    TRANSFORMER.appendChild(SVG);
    gsap.set(CIRCLE, {
      attr: {
        r: 30,
        cx: 50,
        cy: 50 },

      stroke: `hsl(${Math.random() * 359}, 80%, 50%)`,
      strokeWidth: 20 });

    gsap.
    timeline({
      onStart: () => TRANSFORMER_TL(),
      onComplete: () => SVG.remove() }).

    fromTo(
    CIRCLE,
    {
      scale: 0,
      transformOrigin: '50% 50%' },

    {
      scale: 1.25,
      duration: 0.2 }).


    to(
    CIRCLE,
    {
      opacity: 0,
      duration: 0.1 },

    '>-0.1');

  }
});

const LIMIT = 5;
document.addEventListener('pointermove', ({ x, y }) => {
  const posX = gsap.utils.mapRange(0, window.innerWidth, -LIMIT, LIMIT, x);
  const posY = gsap.utils.mapRange(0, window.innerHeight, -LIMIT, LIMIT, y);
  gsap.set(document.documentElement, {
    '--x': posX,
    '--mx': x,
    '--y': posY,
    '--my': y });

});

gsap.set('.transformer', {
  display: 'block' });
</script>
